version: "3.8"

services:
  ton_tradebot:
    build: .
    container_name: ton_tradebot
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./models/model_buy_xgb.pkl:/app/model_buy_xgb.pkl
      - ./models/model_sell_xgb.pkl:/app/model_sell_xgb.pkl
      - ./models/model_buy_lgbm.pkl:/app/model_buy_lgbm.pkl
      - ./models/model_sell_lgbm.pkl:/app/model_sell_lgbm.pkl
      - ./models/stack_model_buy.pkl:/app/stack_model_buy.pkl
      - ./models/stack_model_sell.pkl:/app/stack_model_sell.pkl
      - ./models/meta_model_buy.pkl:/app/meta_model_buy.pkl
      - ./models/meta_model_sell.pkl:/app/meta_model_sell.pkl
      - ./models/calibrated_model_buy.pkl:/app/calibrated_model_buy.pkl
      - ./models/calibrated_model_sell.pkl:/app/calibrated_model_sell.pkl
      - ./models/model_features.json:/app/model_features.json
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
